<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Bienvenue Rafaël</h1>
        <div class="champ_header">
            <label for="recherche" method="HOST"></label>
            <input type="text" name="recherche" id="recherche" placeholder="Recherche">
            <img id="logo_compte" src="./images/logo_compte.png" alt="logo d'une personne symbolisant l'espace compte">
        </div>
    </header>

    <div class="header_1">
        <div class="logo">
            <img src="./images/logo_arcance.png" alt="logo d'arcance">
            <h2>ARCANCE</h2>
        </div>
        <button><img src="./images/logo_reduire.png" alt="logo inférieur à, symbolant le fait de réduire la  taille"></button>
    </div>

    <nav>    
        <button><img src="./images/logo_plus.png" alt="logo d'un plus">Ajouter un élément</button>
        <div class="sous_nav">
            <img src="./images/logo_accueil.png" alt="logo d'une maison">
            <h3>Accueil</h3>
        </div>
        <div class="sous_nav">
            <img id="coffres" src="./images/logo_coffres.png" alt="logo d'une forme géométrique">
            <h3>Coffres</h3>
        </div>
        <div class="sous_nav">
            <img src="./images/logo_offres.png" alt="logo d'un diamant">
            <h3>Offres</h3>
        </div>
        <div class="sous_nav">
            <img src="./images/logo_corbeille.png" alt="logo d'une corbeille">
            <h3>Corbeille</h3>
        </div>
        <div class="sous_nav">
            <img id="aide" src="./images/logo_aide.png" alt="logo d'une point d'interrogation">
            <h3>Aide</h3>
        </div>
    </nav>
    
    <footer>
        <div class="sous_footer">
            <img src="./images/logo_legal.png" alt="logo d'un document">
            <h3>Légal</h3>
        </div>
        <button><img src="./images/logo_augmenter.png" alt="logo supérieur à, symbolant le fait d'augmenter la  taille, d'ouvrir"></button>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Bienvenue Rafaël</h1>
        <div class="champ_header">
            <label for="recherche" method="HOST"></label>
            <input type="text" name="recherche" id="recherche" placeholder="Recherche">
            <a href="#"><img id="logo_compte" src="./images/logo_compte.png" alt="logo d'une personne symbolisant l'espace compte"></a>
        </div>
    </header>

    <div class="header_left">
        <div class="logo">
            <img src="./images/logo_arcance.png" alt="logo d'arcance">
            <h2>ARCANCE</h2>
        </div>
        <button><img src="./images/logo_reduire.png" alt="logo inférieur à, symbolant le fait de réduire la  taille"></button>
    </div>

    <nav>    
        <button><img src="./images/logo_plus.png" alt="logo d'un plus">Ajouter un élément</button>
        <div class="sous_nav" id="bouton_accueil">
            <a href="#"><img src="./images/logo_accueil.png" alt="logo d'une maison">Accueil</a>
        </div>
        <div class="sous_nav">
            <a href="#"><img id="coffres" src="./images/logo_coffres.png" alt="logo d'une forme géométrique">Coffres</a>
        </div>
        <div class="sous_nav">
            <a href="#"><img src="./images/logo_offres.png" alt="logo d'un diamant">Offres</a>
        </div>
        <div class="sous_nav">
            <a href="#"><img src="./images/logo_corbeille.png" alt="logo d'une corbeille">Corbeille</a>
        </div>
        <div class="sous_nav">
            <a href="#"><img id="aide" src="./images/logo_aide.png" alt="logo d'une point d'interrogation">Aide</a>
        </div>
    </nav>
    
    <main>
        <div class="recents">
            <h3>Récents</h3>
            <div>
                <p>Trier</p>
                <button><img src="./images/logo_trier.png" alt="logo de 4 carrés symbolant l'action de trier"></button>
            </div>
        </div>
        <a href="./assets/lorem_pdf.pdf"><div><img class="pdf" src="./images/logo_pdf.png" alt="image d'un document pdf">RIB</div><button><img src="./images/logo_points.png" alt="logo de 3 points pour afficher des options"></button></a>
        <a href="./assets/lorem_pdf.pdf"><div><img class="pdf" src="./images/logo_pdf.png" alt="image d'un document pdf">Relevés de notes 2024</div><button><img src="./images/logo_points.png" alt="logo de 3 points pour afficher des options"></button></a>

        <div class="justificatifs">
            <h3>Justificatifs</h3>
            <div class="filtre">
                <p>Filtrer</p>
                <button><img src="./images/logo_filtrer.png" alt="logo d'un entonnoir"></button>
            </div>
            <div>
                <p>Trier</p>
                <button><img src="./images/logo_trier.png" alt="logo de 4 carrés symbolant l'action de trier"></button>
            </div>
        </div>
        <a href="./assets/lorem_pdf.pdf"><div><img class="pdf" src="./images/logo_pdf.png" alt="image d'un document pdf">Bulletin de salaire - Mars 2026</div><button><img src="./images/logo_points.png" alt="logo de 3 points pour afficher des options"></button></a>
        <a href="./assets/lorem_pdf.pdf"><div><img class="pdf" src="./images/logo_pdf.png" alt="image d'un document pdf">Carte nationale d'identité</div><button><img src="./images/logo_points.png" alt="logo de 3 points pour afficher des options"></button></a>
        <a href="./assets/lorem_pdf.pdf"><div><img class="pdf" src="./images/logo_pdf.png" alt="image d'un document pdf">Contrat de location</div><button><img src="./images/logo_points.png" alt="logo de 3 points pour afficher des options"></button></a>
        
    </main>

    <footer>
        <div class="sous_footer">
            <a href="#"><img src="./images/logo_legal.png" alt="logo d'un document">Légal</a>
        </div>
        <button><img src="./images/logo_augmenter.png" alt="logo supérieur à, symbolant le fait d'augmenter la  taille, d'ouvrir"></button>
    </footer>

</body>
</html>
